# 手动构建Docker镜像 + 推送到Docker Hub
name: Build Docker Image

# 🔥 关键修改：改成【手动触发】，代码推送不会自动构建
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 登录Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 构建并推送Docker镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 👇 把用户名改成你的Docker Hub用户名
          tags: ${{ secrets.DOCKER_USERNAME }}/r1-iot-java:latest
